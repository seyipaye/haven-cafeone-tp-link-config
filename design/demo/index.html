<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="index.css" type="text/css" />
<body >
    <div class="portal">
    
    
    <div class="oper-section-outer">
        <div class="oper-section-inner">
            <div id="oper-hint" role="alert" aria-live="polite"></div>
            <img src="./img/logo.png" alt="cafe-one-logo" srcset="">
            <div class="text-content">
                <h2>Welcome Back</h2>
                <p>Log in to get connected to our Wi-Fi.</p>
            </div>
            <form id="login-form">
                <div id="input-user" class="input-container">
                    <span class="icon left-icon user"></span>
                    <input id="username" class="oper-section-item input" name="username" type="email" placeholder="Enter your email to connect"/>
                </div>
            </form>
            <div id="button-area">
                <button id="button-login" class="button oper-section-item">Log In</button>
            </div>
        </div>
    </div>
</div>
</body>
<script src="index.js"></script>
