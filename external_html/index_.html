<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="index.css" type="text/css" />
<body class="portal">
    <div id="oper-hint" style="color: red"></div>

    <div class="oper-section-outer">
        <div class="oper-section-inner">
            <form id="login-form" method="post" accept-charset="UTF-8">
                <input type="hidden" name="password" id="password" />
                <input type="hidden" name="clientMac" id="clientMac" />
                <input type="hidden" name="clientIp" id="clientIp" />
                <input type="hidden" name="apMac" id="apMac" />
                <input type="hidden" name="gatewayMac" id="gatewayMac" />
                <input type="hidden" name="ssidName" id="ssidName" />
                <input type="hidden" name="radioId" id="radioId" />
                <input type="hidden" name="vid" id="vid" />
                <input type="hidden" name="authType" id="authType" />
                <input type="hidden" name="originUrl" id="originUrl" />

                <div id="input-user" class="input-container">
                    <span class="icon left-icon user"></span>
                    <input id="usernam
                    e" class="oper-section-item input" name="username" type="email" placeholder="Enter your email to connect"/>
                </div>

                <button id="button-login" type="submit" class="button oper-section-item">Log In</button>
            </form>
        </div>
    </div>

</body>
<script src="index.js"></script>
